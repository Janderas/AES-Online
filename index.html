<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Arcade Neo Geo Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background:#0d0d0d;
    color:#00ff90;
    font-family: monospace;
    text-align:center;
  }

  h1 { color:#00ffcc; }

  #game {
    width:800px;
    height:600px;
    margin:20px auto;
    border:3px solid #00ff90;
    box-shadow: 0 0 20px #00ff90;
  }

  .panel {
    margin:15px auto;
    padding:15px;
    border:1px solid #333;
    width:80%;
    max-width:500px;
    background:#111;
  }

  input, select, button {
    margin:10px;
    padding:8px;
  }

  button {
    background:#00ff90;
    color:black;
    border:none;
    cursor:pointer;
    font-weight:bold;
  }

  button:hover {
    background:#00cc70;
  }
</style>
</head>

<body>

<h1>🕹️ Arcade Neo Geo Online</h1>

<div class="panel">
  <h3>Subir ROM(s)</h3>
  <input type="file" id="romInput" accept=".zip" multiple>
</div>

<div class="panel">
  <h3>Elegir juego</h3>
  <select id="romSelector"></select><br>
  <button onclick="startGame()">▶ INICIAR</button>
</div>

<div id="game"></div>

<script>
let romList = [];

// Cargar ROMs
document.getElementById('romInput').addEventListener('change', function(e) {
  romList = [...e.target.files];
  const selector = document.getElementById('romSelector');
  selector.innerHTML = '';

  romList.forEach((file, index) => {
    const option = document.createElement('option');
    option.value = index;
    option.textContent = file.name;
    selector.appendChild(option);
  });
});

// Iniciar emulador
function startGame() {
  const selector = document.getElementById('romSelector');

  if (selector.value === '') {
    alert('Selecciona una ROM');
    return;
  }

  const romFile = romList[selector.value];
  const romURL = URL.createObjectURL(romFile);

  document.getElementById('game').innerHTML = "";

  // Config EmulatorJS
  window.EJS_player = "#game";
  window.EJS_core = "fbneo";
  window.EJS_gameUrl = romURL;

  // CDN
  window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

  window.EJS_startOnLoaded = true;
  window.EJS_fullscreenOnLoaded = true;
  window.EJS_touchControls = true;
  window.EJS_enableSavestates = true;

  // Cargar EmulatorJS
  const script = document.createElement("script");
