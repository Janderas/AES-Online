<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Arcade Neo Geo DEFINITIVO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:black;color:#00ff90;font-family:monospace;text-align:center}
h1{color:#00ffcc;text-shadow:0 0 10px #0ff}
#game{width:900px;height:650px;margin:20px auto;border:4px solid #00ff90;box-shadow:0 0 25px #00ff90}
.panel{margin:15px auto;padding:15px;border:1px solid #222;width:80%;max-width:500px;background:#050505;box-shadow:0 0 10px #0f0}
button{margin:10px;padding:10px 20px;background:#00ff90;border:none;color:#000;font-weight:bold;cursor:pointer}
button:hover{background:#00cc70}
select,input{margin:10px;padding:8px}
#status{margin-top:10px}
#preview{margin-top:10px;font-size:12px;color:#ccc}
</style>
</head>
<body>

<h1>🕹️ ARCADE DEFINITIVO</h1>

<div class="panel">
<h3>Sube tus ROMs</h3>
<input type="file" id="romInput" accept=".zip" multiple>
</div>

<div class="panel">
<h3>Selecciona juego</h3>
<select id="romSelector"></select><br>
<button onclick="startGame()">▶ JUGAR</button>
<div id="status"></div>
<div id="preview"></div>
</div>

<div id="game"></div>

<script>
let romList=[];

const coverMap={
"mslug.zip":"METAL SLUG",
"kof98.zip":"KING OF FIGHTERS 98",
"turfmast.zip":"NEO TURF MASTERS",
"samsho2.zip":"SAMURAI SHODOWN II"
};

document.getElementById('romInput').addEventListener('change',function(e){
  romList=[...e.target.files];
  const sel=document.getElementById('romSelector');
  sel.innerHTML='';

  romList.forEach((file,i)=>{
    const opt=document.createElement('option');
    opt.value=i;
    opt.textContent=file.name;
    sel.appendChild(opt);
  });

  updatePreview();
});

document.getElementById('romSelector').addEventListener('change',updatePreview);

function updatePreview(){
  const sel=document.getElementById('romSelector');
  const preview=document.getElementById('preview');

  if(sel.value==='') return;

  const name=romList[sel.value].name.toLowerCase();

  preview.textContent=coverMap[name] || "🎮 Juego cargado";
}

function setStatus(msg,color){
  const s=document.getElementById('status');
  s.style.color=color;
  s.textContent=msg;
}

function startGame(){
  const sel=document.getElementById('romSelector');

  if(sel.value===''){
    setStatus("Selecciona una ROM","red");
    return;
  }

  const romFile=romList[sel.value];
  const romURL=URL.createObjectURL(romFile);

  setStatus("Cargando...","#0f0");

  document.getElementById('game').innerHTML="";

  window.EJS_player="#game";
  window.EJS_core="fbneo";
  window.EJS_gameUrl=romURL;
  window.EJS_pathtodata="https://cdn.emulatorjs.org/stable/data/";

  window.EJS_startOnLoaded=true;
  window.EJS_fullscreenOnLoaded=true;
  window.EJS_touchControls=true;
  window.EJS_enableSavestates=true;

  localStorage.setItem("lastGame",sel.value);

  const script=document.createElement("script");
  script.src="https://cdn.emulatorjs.org/stable/data/loader.js";
  document.body.appendChild(script);
}

// Restaurar último juego
window.onload=function(){
  const last=localStorage.getItem("lastGame");
  if(last){
    document.getElementById('romSelector').value=last;
  }
};
</script>

</body>
</html>
