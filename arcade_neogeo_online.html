<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Arcade Neo Geo Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0d0d0d;color:#00ff90;font-family:monospace;text-align:center}
h1{color:#00ffcc}
#game{width:800px;height:600px;margin:20px auto;border:3px solid #00ff90;box-shadow:0 0 20px #00ff90}
.panel{margin:15px auto;padding:15px;border:1px solid #333;width:80%;max-width:500px;background:#111}
input,select,button{margin:10px;padding:8px}
button{background:#00ff90;color:black;border:none;cursor:pointer;font-weight:bold}
button:hover{background:#00cc70}
</style>
</head>
<body>
<h1>🕹️ Arcade Neo Geo Online</h1>
<div class="panel">
<h3>1. Subir BIOS (neogeo.zip)</h3>
<input type="file" id="biosInput" accept=".zip">
</div>
<div class="panel">
<h3>2. Subir ROM(s)</h3>
<input type="file" id="romInput" accept=".zip" multiple>
</div>
<div class="panel">
<h3>3. Elegir juego</h3>
<select id="romSelector"></select><br>
<button onclick="startGame()">▶ INICIAR</button>
</div>
<div id="game"></div>
<script>
let romList=[];
document.getElementById('romInput').addEventListener('change',function(e){romList=[...e.target.files];const selector=document.getElementById('romSelector');selector.innerHTML='';romList.forEach((file,index)=>{const option=document.createElement('option');option.value=index;option.textContent=file.name;selector.appendChild(option)})});
function startGame(){const biosFile=document.getElementById('biosInput').files[0];const selector=document.getElementById('romSelector');if(!biosFile||selector.value===''){alert('Debes subir BIOS y seleccionar una ROM');return;}const romFile=romList[selector.value];const biosURL=URL.createObjectURL(biosFile);const romURL=URL.createObjectURL(romFile);document.getElementById('game').innerHTML="";window.EJS_player="#game";window.EJS_core="fbneo";window.EJS_gameUrl=romURL;window.EJS_biosUrl=biosURL;window.EJS_pathtodata="https://cdn.emulatorjs.org/stable/data/";window.EJS_startOnLoaded=true;window.EJS_fullscreenOnLoaded=true;window.EJS_touchControls=true;window.EJS_enableSavestates=true;window.EJS_volume=1.0;const script=document.createElement("script");script.src="https://cdn.emulatorjs.org/stable/data/loader.js";document.body.appendChild(script);}
</script>
</body>
</html>
